<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSS Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/dashboard.css') }}">
</head>
<body class="dashboard-body">
    <main class="dashboard-shell">
        <section class="dashboard-hero">
            <div>
                <p class="eyebrow">Live Console</p>
                <h1 id="welcome-title">Loading your workspace...</h1>
                <p id="welcome-copy" class="hero-copy">Connecting to clients, alerts, and account context.</p>
            </div>
            <button id="logout-button" class="ghost-button" type="button">Log Out</button>
        </section>

        <section class="metrics-grid">
            <article class="metric-card">
                <p>Role</p>
                <h2 id="metric-role">-</h2>
            </article>
            <article class="metric-card">
                <p>Visible Clients</p>
                <h2 id="metric-clients">0</h2>
            </article>
            <article class="metric-card">
                <p>Active Alerts</p>
                <h2 id="metric-alerts">0</h2>
            </article>
        </section>

        <div id="dashboard-message" class="message" hidden></div>

        <section class="content-grid">
            <article class="panel">
                <div class="panel-heading">
                    <p class="panel-kicker">Account</p>
                    <h2>Signed-in identity</h2>
                </div>
                <dl id="account-details" class="detail-list"></dl>
            </article>

            <article class="panel">
                <div class="panel-heading">
                    <p class="panel-kicker">Clients</p>
                    <h2>Accessible client records</h2>
                </div>
                <div id="clients-list" class="stack-list"></div>
            </article>

            <article class="panel panel-wide">
                <div class="panel-heading">
                    <p class="panel-kicker">Alerts</p>
                    <h2>Latest security events</h2>
                </div>
                <div id="alerts-list" class="stack-list"></div>
            </article>
        </section>
    </main>

    <script>
        const token = localStorage.getItem("mss_access_token");
        const cachedUser = localStorage.getItem("mss_user");
        const dashboardMessage = document.getElementById("dashboard-message");

        if (!token) {
            window.location.href = "/login";
        }

        function setMessage(text, tone) {
            if (!text) {
                dashboardMessage.hidden = true;
                dashboardMessage.textContent = "";
                dashboardMessage.className = "message";
                return;
            }

            dashboardMessage.hidden = false;
            dashboardMessage.textContent = text;
            dashboardMessage.className = `message message-${tone}`;
        }

        function authHeaders() {
            return {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            };
        }

        async function fetchJson(url) {
            const response = await fetch(url, { headers: authHeaders() });
            const data = await response.json();

            if (response.status === 401) {
                localStorage.removeItem("mss_access_token");
                localStorage.removeItem("mss_user");
                window.location.href = "/login";
                throw new Error("Session expired");
            }

            if (!response.ok) {
                throw new Error(data.error || `Request failed for ${url}`);
            }

            return data;
        }

        function renderAccount(user) {
            const accountDetails = document.getElementById("account-details");
            const friendlyRole = user.role === "admin" ? "Administrator" : "Client";

            accountDetails.innerHTML = `
                <div><dt>Email</dt><dd>${user.email}</dd></div>
                <div><dt>Role</dt><dd>${friendlyRole}</dd></div>
                <div><dt>Client ID</dt><dd>${user.client_id || "Not linked"}</dd></div>
                <div><dt>Status</dt><dd>${user.is_active ? "Active" : "Inactive"}</dd></div>
            `;

            document.getElementById("metric-role").textContent = friendlyRole;
            document.getElementById("welcome-title").textContent = user.role === "admin"
                ? "Admin command center"
                : "Client security dashboard";
            document.getElementById("welcome-copy").textContent = user.role === "admin"
                ? "Monitor onboarding, alerts, and response activity across every client."
                : "Track the alerts and protection status assigned to your organization.";
        }

        function renderClients(clients) {
            document.getElementById("metric-clients").textContent = clients.length;
            const clientsList = document.getElementById("clients-list");

            if (!clients.length) {
                clientsList.innerHTML = '<p class="empty-state">No client records are available yet.</p>';
                return;
            }

            clientsList.innerHTML = clients.map((client) => `
                <article class="list-card">
                    <h3>${client.name}</h3>
                    <p>${client.email}</p>
                    <span>Client #${client.id}</span>
                </article>
            `).join("");
        }

        function renderAlerts(alerts) {
            document.getElementById("metric-alerts").textContent = alerts.length;
            const alertsList = document.getElementById("alerts-list");

            if (!alerts.length) {
                alertsList.innerHTML = '<p class="empty-state">No alerts have been recorded yet.</p>';
                return;
            }

            alertsList.innerHTML = alerts.map((alert) => `
                <article class="list-card alert-card">
                    <div class="alert-topline">
                        <h3>${alert.title}</h3>
                        <span class="severity severity-${alert.severity.toLowerCase()}">${alert.severity}</span>
                    </div>
                    <p>Status: ${alert.status}</p>
                    <span>Client #${alert.client_id}</span>
                </article>
            `).join("");
        }

        async function boot() {
            try {
                const me = await fetchJson("/auth/me");
                const [clients, alerts] = await Promise.all([
                    fetchJson("/clients"),
                    fetchJson("/alerts")
                ]);

                localStorage.setItem("mss_user", JSON.stringify(me.user));
                renderAccount(me.user);
                renderClients(clients.clients || []);
                renderAlerts(alerts.alerts || []);
                setMessage("", "info");
            } catch (error) {
                if (cachedUser) {
                    renderAccount(JSON.parse(cachedUser));
                }
                setMessage(error.message || "Failed to load dashboard data.", "error");
            }
        }

        document.getElementById("logout-button").addEventListener("click", () => {
            localStorage.removeItem("mss_access_token");
            localStorage.removeItem("mss_user");
            window.location.href = "/login";
        });

        boot();
    </script>
</body>
</html>
